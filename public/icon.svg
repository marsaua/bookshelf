<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark blue rounded background -->
  <rect width="512" height="512" rx="96" fill="#192a44"/>

  <!-- Book cover (cream) -->
  <rect x="124" y="88" width="264" height="336" rx="10" fill="#f0e0c8"/>

  <!-- Spine (golden) -->
  <rect x="124" y="88" width="52" height="336" fill="#d4af37"/>
  <rect x="124" y="88" width="52" height="336" rx="10" fill="#d4af37"/>
  <!-- square off the right side of the spine -->
  <rect x="152" y="88" width="24" height="336" fill="#d4af37"/>

  <!-- Pages — right edge stack -->
  <rect x="376" y="96" width="12" height="320" rx="4" fill="#d9c9a8"/>

  <!-- Decorative text lines on cover -->
  <rect x="198" y="185" width="158" height="11" rx="5" fill="#192a44" opacity="0.2"/>
  <rect x="198" y="218" width="118" height="11" rx="5" fill="#192a44" opacity="0.2"/>
  <rect x="198" y="251" width="140" height="11" rx="5" fill="#192a44" opacity="0.2"/>
  <rect x="198" y="284" width="96"  height="11" rx="5" fill="#192a44" opacity="0.2"/>

  <!-- Small golden bookmark ribbon -->
  <polygon points="296,88 326,88 326,152 311,138 296,152" fill="#d4af37"/>
</svg>
